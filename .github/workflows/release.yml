name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "ELAP ${GITHUB_REF_NAME#v}" --notes-from-tag || gh release edit "${GITHUB_REF_NAME}"
